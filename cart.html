<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Supamart</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f8f6f1;
      --accent: #e8491d;
      --gray: #2a2a2a;
      --light-gray: #ebebeb;
      --mid-gray: #888;
      --border: #e0ddd6;
      --green: #25D366;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
    }

    header {
      background: var(--black);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      border-bottom: 2px solid var(--accent);
    }

    .logo a {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--white);
      text-decoration: none;
    }

    .logo a span { color: var(--accent); }

    .header-nav a {
      color: var(--white);
      text-decoration: none;
      font-size: 0.85rem;
      margin-left: 1.5rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .header-nav a:hover { opacity: 1; }

    /* PAGE */
    .cart-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .cart-page h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .cart-page h1 .count-badge {
      background: var(--accent);
      color: white;
      font-size: 0.9rem;
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* LAYOUT */
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 2rem;
      align-items: start;
    }

    /* CART ITEMS */
    .cart-items-section {}

    .cart-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 1rem;
      align-items: center;
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      transition: box-shadow 0.2s;
    }

    .cart-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

    .cart-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      background: var(--light-gray);
    }

    .item-details h3 {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .item-details .item-store {
      font-size: 0.75rem;
      color: var(--mid-gray);
      margin-bottom: 0.5rem;
    }

    .item-details .item-price {
      font-weight: 600;
      color: var(--accent);
      font-size: 0.95rem;
    }

    .item-controls {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.8rem;
    }

    .quantity-control {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--light-gray);
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .qty-btn:hover { background: var(--border); }

    .qty-input {
      width: 40px;
      text-align: center;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--mid-gray);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .remove-btn:hover { background: #fee; color: #e53e3e; }

    /* EMPTY STATE */
    .empty-cart {
      text-align: center;
      padding: 5rem 2rem;
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .empty-cart i {
      font-size: 4rem;
      color: var(--light-gray);
      margin-bottom: 1rem;
      display: block;
    }

    .empty-cart h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
    }

    .empty-cart p { color: var(--mid-gray); margin-bottom: 1.5rem; }

    .btn-shop {
      display: inline-block;
      padding: 0.8rem 2rem;
      background: var(--accent);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .btn-shop:hover { background: #c73d16; }

    /* ORDER SUMMARY */
    .order-summary {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      position: sticky;
      top: 80px;
    }

    .order-summary h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.8rem;
      font-size: 0.9rem;
    }

    .summary-row span:first-child { color: var(--mid-gray); }
    .summary-row span:last-child { font-weight: 500; }

    .summary-total {
      display: flex;
      justify-content: space-between;
      padding-top: 1rem;
      margin-top: 1rem;
      border-top: 2px solid var(--black);
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
    }

    .whatsapp-order-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 1rem;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      margin-top: 1.5rem;
      transition: background 0.2s, transform 0.2s;
    }

    .whatsapp-order-btn:hover {
      background: #20b858;
      transform: translateY(-2px);
    }

    /* FINCRA PAYMENT BUTTON - placeholder for later */
    .fincra-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 1rem;
      background: var(--black);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 0.8rem;
      transition: background 0.2s, transform 0.2s;
      position: relative;
    }

    .fincra-btn:hover {
      background: var(--gray);
      transform: translateY(-2px);
    }

    .fincra-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--accent);
      color: white;
      font-size: 0.6rem;
      padding: 2px 6px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .divider-text {
      text-align: center;
      color: var(--mid-gray);
      font-size: 0.8rem;
      margin: 0.8rem 0;
      position: relative;
    }

    .divider-text::before,
    .divider-text::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }

    .divider-text::before { left: 0; }
    .divider-text::after { right: 0; }

    .clear-cart-btn {
      width: 100%;
      padding: 0.7rem;
      background: transparent;
      color: var(--mid-gray);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 0.8rem;
      transition: all 0.2s;
    }

    .clear-cart-btn:hover { border-color: #e53e3e; color: #e53e3e; }

    .secure-badges {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
      color: var(--mid-gray);
      font-size: 0.75rem;
    }

    .secure-badges span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* FOOTER */
    footer {
      background: var(--black);
      color: var(--mid-gray);
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
      margin-top: 4rem;
    }

    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .order-summary { position: static; }
      .header-nav { display: none; }
      .cart-item { grid-template-columns: 60px 1fr; }
      .item-controls { flex-direction: row; align-items: center; grid-column: 1 / -1; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo"><a href="/"><span>Supa</span>mart</a></div>
    <nav class="header-nav">
      <a href="/">Home</a>
      <a href="/shop.html">Shop</a>
      <a href="/categories.html">Categories</a>
      <a href="/login.html">Login</a>
    </nav>
  </header>

  <div class="cart-page">
    <h1>
      <i class="fas fa-shopping-cart"></i>
      Your Cart
      <span class="count-badge" id="cart-count-badge">0</span>
    </h1>

    <div class="cart-layout">
      <!-- CART ITEMS -->
      <div class="cart-items-section" id="cart-items-container">
        <!-- filled by JS -->
      </div>

      <!-- ORDER SUMMARY -->
      <div class="order-summary" id="order-summary" style="display:none;">
        <h2>Order Summary</h2>

        <div id="summary-items"></div>

        <div class="summary-total">
          <span>Total</span>
          <span id="summary-total">NGN 0</span>
        </div>

        <a id="whatsapp-order-btn" href="#" target="_blank" class="whatsapp-order-btn">
          <i class="fab fa-whatsapp"></i> Order via WhatsApp
        </a>

        <div class="divider-text">or pay online</div>

        <button class="fincra-btn" onclick="handleFincraPayment()">
          <i class="fas fa-credit-card"></i> Pay with Fincra
          <span class="fincra-badge">Coming Soon</span>
        </button>

        <button class="clear-cart-btn" onclick="handleClearCart()">
          <i class="fas fa-trash"></i> Clear Cart
        </button>

        <div class="secure-badges">
          <span><i class="fas fa-lock"></i> Secure</span>
          <span><i class="fas fa-shield-alt"></i> Protected</span>
          <span><i class="fas fa-check-circle"></i> Trusted</span>
        </div>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2025 Supamart — Owned by Supper Needs International Ltd.
    &nbsp;|&nbsp; <a href="/">Home</a>
    &nbsp;|&nbsp; <a href="/shop.html">Shop</a>
  </footer>

  <script src="../js/cart.js"></script>
  <script>
    const ADMIN_WHATSAPP = '2348034370930';

    function renderCart() {
      const cart = Cart.getCart();
      const container = document.getElementById('cart-items-container');
      const summary = document.getElementById('order-summary');
      const badge = document.getElementById('cart-count-badge');

      badge.textContent = Cart.getCount();

      if (cart.length === 0) {
        summary.style.display = 'none';
        container.innerHTML = `
          <div class="empty-cart">
            <i class="fas fa-shopping-cart"></i>
            <h3>Your cart is empty</h3>
            <p>Browse our products and add items to your cart.</p>
            <a href="/shop.html" class="btn-shop">Continue Shopping</a>
          </div>
        `;
        return;
      }

      summary.style.display = 'block';

      // Render items
      container.innerHTML = cart.map(item => `
        <div class="cart-item" id="item-${item.id}">
          <img src="${item.image || 'https://ui-avatars.com/api/?name=Product&size=80&background=ebebeb&color=888'}" 
               alt="${item.name}"
               onerror="this.src='https://ui-avatars.com/api/?name=Product&size=80&background=ebebeb&color=888'">
          <div class="item-details">
            <h3>${item.name}</h3>
            <p class="item-store">${item.storeName}</p>
            <p class="item-price">${item.currency} ${(item.price * item.quantity).toLocaleString()}</p>
          </div>
          <div class="item-controls">
            <div class="quantity-control">
              <button class="qty-btn" onclick="changeQty('${item.id}', ${item.quantity - 1})">−</button>
              <input class="qty-input" type="number" value="${item.quantity}" min="1" max="${item.stock}"
                     onchange="changeQty('${item.id}', parseInt(this.value))">
              <button class="qty-btn" onclick="changeQty('${item.id}', ${item.quantity + 1})">+</button>
            </div>
            <button class="remove-btn" onclick="removeItem('${item.id}')">
              <i class="fas fa-trash"></i> Remove
            </button>
          </div>
        </div>
      `).join('');

      // Render summary
      const total = Cart.getTotal();
      const currency = cart[0]?.currency || 'NGN';

      document.getElementById('summary-items').innerHTML = cart.map(item => `
        <div class="summary-row">
          <span>${item.name} x${item.quantity}</span>
          <span>${item.currency} ${(item.price * item.quantity).toLocaleString()}</span>
        </div>
      `).join('');

      document.getElementById('summary-total').textContent = `${currency} ${total.toLocaleString()}`;

      // Update WhatsApp link
      const waMessage = Cart.buildWhatsAppMessage();
      document.getElementById('whatsapp-order-btn').href = 
        `https://wa.me/${ADMIN_WHATSAPP}?text=${waMessage}`;
    }

    function changeQty(productId, quantity) {
      Cart.updateQuantity(productId, quantity);
      renderCart();
    }

    function removeItem(productId) {
      Cart.removeItem(productId);
      renderCart();
    }

    function handleClearCart() {
      if (confirm('Clear all items from cart?')) {
        Cart.clearCart();
        renderCart();
      }
    }

    function handleFincraPayment() {
      alert('Online payment coming soon! Please use WhatsApp order for now.');
      // TODO: Integrate Fincra payment gateway here
      // Example:
      // FincraCheckout.init({
      //   key: 'your_fincra_public_key',
      //   amount: Cart.getTotal(),
      //   currency: 'NGN',
      //   customer: { email: '' },
      //   onSuccess: (response) => { ... },
      //   onClose: () => { ... }
      // });
    }

    // Initial render
    document.addEventListener('DOMContentLoaded', renderCart);
  </script>

</body>
</html>
